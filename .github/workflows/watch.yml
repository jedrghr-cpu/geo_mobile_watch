name: geo-mobile-watch

on:
  schedule:
    # JST 9:00 / 12:00 / 17:00 / 21:00 （UTC 0,3,8,12時）
    - cron: '0 0,3,8,12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/watch.py

      - name: Commit & push if changed
        run: |
          git config user.name "geo-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data docs
          git diff --cached --quiet || git commit -m "update: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
